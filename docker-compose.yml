services:
  aiproxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: aiproxy:local
    container_name: aiproxy
    restart: unless-stopped
    stop_grace_period: 35s
    ports:
      - "127.0.0.1:8081:7777"
    environment:
      COPILOT2API_DEBUG: "${COPILOT2API_DEBUG:-true}"
      COPILOT2API_TOKEN_DIR: "/home/aiproxy/.config/copilot2api"
    command: ["--debug"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./auth-data:/home/aiproxy/.config/copilot2api
      - ./providers.json:/app/providers.json:ro
      - ./logs:/app/logs
    stdin_open: true
    tty: true
